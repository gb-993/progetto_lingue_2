# PROGETTO_LINGUA_2/compose.yml
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - dbdata:/var/lib/postgresql/data
      - backups:/backups
    restart: unless-stopped
    # Limite Log
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      #- ./:/app  # da commentare per prod
      - staticfiles:/app/staticfiles
      - media:/app/media
      - backups:/app/_backups:ro
    expose:
      - "8000"
    restart: unless-stopped
    # Limite Log
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile    
    depends_on:
      - web
    ports:
    - "443:443"
    - "80:80"
    #- "8080:80"
    volumes:
      - staticfiles:/static
      - media:/media
    restart: unless-stopped
    # Limite Log
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


