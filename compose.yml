# PROGETTO_LINGUA_2/compose.yml
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - dbdata:/var/lib/postgresql/data
    restart: unless-stopped
    # Limite Log
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      #- ./:/app  # da commentare per prod
      - staticfiles:/app/staticfiles
      - media:/app/media
    expose:
      - "8000"
    restart: unless-stopped
    # Limite Log
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile    
    depends_on:
      - web
    ports:
    - "443:443"
    - "80:80"
    #- "8080:80"
    volumes:
      - staticfiles:/static
      - media:/media
    restart: unless-stopped
    # Limite Log
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  
  cleaner:
    image: docker:20.10-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # Attende per 7 giorni (604800 secondi), fa pulizia in background e ricomincia
    command: sh -c "while true; do sleep 604800; docker system prune -f; done"
    restart: unless-stopped

volumes:
  dbdata:
  staticfiles:
  media: